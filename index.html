<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialNet Manager</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5.3 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">

  <!-- Custom styles (must come AFTER Bootstrap CDN) -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Supabase JS client via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ===== APPLICATION TITLE HEADER ===== -->
  <header id="app-header">
    <h1 id="app-title">LBYCPG3 SocialNet - Profile Manager</h1>
  </header>

  <!-- ===== APP WRAPPER ===== -->
  <div id="app-wrapper">
    <main class="container-fluid flex-grow-1 py-3">
      <div class="row g-3 h-100">

        <!-- ===== LEFT PANEL: Profile Management ===== -->
        <div class="col-12 col-md-4">
          <div class="sn-panel">
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3 text-uppercase">Profile Management</h6>

            <!-- Add / Lookup label -->
            <label class="form-label fw-semibold small mb-1">Add/Lookup Profile:</label>

            <!-- Single input used for both Add and Lookup -->
            <input type="text" id="input-name" class="form-control form-control-sm mb-2"
                   placeholder="Enter profile name">

            <!-- Action buttons row -->
            <div class="d-flex gap-2 mb-3">
              <button id="btn-add"    class="btn btn-primary btn-sm">Add</button>
              <button id="btn-clear" class="btn btn-secondary btn-sm">Clear</button>
              <button id="btn-delete" class="btn btn-danger btn-sm">Delete</button>
            </div>

            <!-- Profile List -->
            <p class="small fw-semibold text-muted mb-1">All Profiles:</p>
            <div id="profile-list" class="profile-list-box">
              <!-- Populated dynamically by JavaScript -->
            </div>
          </div>
        </div>

        <!-- ===== CENTER PANEL: Profile Information ===== -->
        <div class="col-12 col-md-4">
          <div class="sn-panel text-center">
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3 text-uppercase">Profile Information</h6>

            <!-- Profile picture -->
            <img id="profile-pic"
                 src="resources/images/default.png"
                 alt="Profile picture"
                 class="profile-thumb" />

            <!-- Name -->
            <h4 id="profile-name" class="profile-hero-name">No Profile Selected</h4>

            <!-- Current Status -->
            <p class="small fw-semibold text-start text-muted mb-1">Current Status:</p>
            <div id="profile-status" class="sn-textbox mb-3">&mdash;</div>

            <!-- Favorite Quote -->
            <p class="small fw-semibold text-start text-muted mb-1">Favorite Quote:</p>
            <div id="profile-quote" class="sn-textbox mb-3">&mdash;</div>

            <!-- Friends list -->
            <p class="small fw-semibold text-start text-muted mb-1">Friends:</p>
            <div id="friends-list" class="sn-textbox sn-textbox--tall text-start">
              <!-- Populated dynamically by JavaScript -->
            </div>
          </div>
        </div>

        <!-- ===== RIGHT PANEL: Edit Profile ===== -->
        <div class="col-12 col-md-4">
          <div class="sn-panel">
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3 text-uppercase">Edit Profile</h6>

            <!-- Change Status -->
            <label class="form-label fw-semibold small">Change Status:</label>
            <input type="text" id="input-status" class="form-control form-control-sm mb-2"
                   placeholder="Enter new status">
            <button id="btn-status" class="btn sn-btn-blue btn-sm w-100 mb-3">Update Status</button>

            <!-- Change Favorite Quote -->
            <label class="form-label fw-semibold small">Change Favorite Quote:</label>
            <input type="text" id="input-quote" class="form-control form-control-sm mb-2"
                   placeholder="Enter favorite quote">
            <button id="btn-quote" class="btn sn-btn-blue btn-sm w-100 mb-3">Update Quote</button>

            <!-- Change Picture -->
            <label class="form-label fw-semibold small">Change Picture:</label>
            <input type="text" id="input-picture" class="form-control form-control-sm mb-2"
                   placeholder="Enter image filename">
            <button id="btn-picture" class="btn sn-btn-blue btn-sm w-100 mb-3">Update Picture</button>

            <!-- Manage Friends -->
            <label class="form-label fw-semibold small">Manage Friends:</label>
            <input type="text" id="input-friend" class="form-control form-control-sm mb-2"
                   placeholder="Enter friend's name">
            <div class="d-flex gap-2 mb-3">
              <button id="btn-add-friend"    class="btn sn-btn-green btn-sm flex-grow-1">Add Friend</button>
              <button id="btn-remove-friend" class="btn sn-btn-orange btn-sm flex-grow-1">Remove</button>
            </div>

            <!-- Spacer pushes Exit to bottom -->
            <div class="flex-grow-1"></div>

            <!-- Exit -->
            <button id="btn-exit" class="btn sn-btn-dark btn-sm w-100 mt-3">Exit</button>
          </div>
        </div>

      </div><!-- /.row -->
    </main>

    <!-- STATUS BAR -->
    <footer id="status-bar">
      <span id="status-message">Ready. Select a profile from the list or add a new one.</span>
    </footer>
  </div><!-- /#app-wrapper -->

  <!-- Bootstrap JS bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
          crossorigin="anonymous"></script>

  <!-- Application logic -->
  <script src="js/app.js"></script>
</body>
</html>
